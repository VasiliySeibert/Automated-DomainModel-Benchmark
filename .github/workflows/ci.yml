name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install spacy
          python -m spacy download en_core_web_sm

      - name: Run tests
        run: PYTHONPATH=. python -m pytest tests/ -v --tb=short

      - name: Smoke-test the CLI entry points
        run: |
          PYTHONPATH=. python scripts/run_orchestrator.py --candidates rule_based --datasets kaiser --limit 1
          PYTHONPATH=. python scripts/run_metric_runner.py --candidates rule_based --datasets kaiser